name: NotchDock
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.3.0
targets:
  NotchDock:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NotchDock
    info:
      path: NotchDock/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.river.notchdock
        PRODUCT_NAME: NotchDock
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    scheme:
      testTargets:
        - NotchDockTests
  NotchDockTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: NotchDock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.river.notchdock.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NotchDock.app/Contents/MacOS/NotchDock"
