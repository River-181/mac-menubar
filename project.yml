name: NotchDock
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.3.0
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: 8.1.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.18.7
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.57.1
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: 1.1.0
targets:
  NotchDock:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NotchDock
    info:
      path: NotchDock/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.river.notchdock
        PRODUCT_NAME: NotchDock
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Defaults
        product: Defaults
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: Sentry
        product: Sentry
      - package: LaunchAtLogin
        product: LaunchAtLogin
    scheme:
      testTargets:
        - NotchDockTests
  NotchDockTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: NotchDock
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.river.notchdock.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NotchDock.app/Contents/MacOS/NotchDock"
